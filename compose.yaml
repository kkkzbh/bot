name: qqbot-stack

services:
  pmhq:
    image: ${PMHQ_IMAGE:-docker.io/linyuchen/pmhq}:${PMHQ_TAG:-latest}
    container_name: pmhq
    network_mode: pasta
    environment:
      ENABLE_HEADLESS: ${ENABLE_HEADLESS:-false}
      AUTO_LOGIN_QQ: ${AUTO_LOGIN_QQ:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - qq_volume:/root/.config/QQ
    ports:
      - "${PMHQ_BIND_HOST:-127.0.0.1}:${PMHQ_PORT:-13000}:13000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  voice-asr:
    build:
      context: ./docker/voice-asr
    image: qqbot-voice-asr:local
    container_name: qqbot-voice-asr
    environment:
      VOICE_ASR_HOST: 0.0.0.0
      VOICE_ASR_PORT: 8080
      VOICE_ASR_MODEL: ${VOICE_ASR_MODEL:-small}
      VOICE_ASR_COMPUTE_TYPE: ${VOICE_ASR_COMPUTE_TYPE:-int8}
      VOICE_ASR_API_KEY: ${QQ_VOICE_ASR_API_KEY:-}
      VOICE_ASR_CACHE_DIR: /data/voice/asr/cache
      VOICE_ASR_MAX_SECONDS: ${QQ_VOICE_INPUT_MAX_SECONDS:-60}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${VOICE_ASR_PORT:-5161}:8080"
    volumes:
      - ./data/voice/asr:/data/voice/asr:Z
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  qq_volume:
