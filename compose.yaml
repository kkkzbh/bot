name: qqbot-stack

services:
  ollama:
    image: ${OLLAMA_IMAGE:-docker.io/ollama/ollama}:${OLLAMA_TAG:-latest}
    container_name: ollama
    entrypoint:
      - /bin/sh
      - /usr/local/bin/ollama-startup.sh
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text:latest}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama-startup.sh:/usr/local/bin/ollama-startup.sh:ro,Z
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  pmhq:
    image: ${PMHQ_IMAGE:-docker.io/linyuchen/pmhq}:${PMHQ_TAG:-latest}
    container_name: pmhq
    privileged: true
    environment:
      ENABLE_HEADLESS: ${ENABLE_HEADLESS:-false}
      AUTO_LOGIN_QQ: ${AUTO_LOGIN_QQ:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - qq_volume:/root/.config/QQ
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  llbot:
    image: ${LLBOT_IMAGE:-docker.io/linyuchen/llbot}:${LLBOT_TAG:-latest}
    container_name: llonebot
    environment:
      PMHQ_HOST: pmhq
      WEBUI_PORT: ${LLONEBOT_WEBUI_PORT:-3080}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${LLONEBOT_WEBUI_PORT:-3080}:${LLONEBOT_WEBUI_PORT:-3080}"
      - "${LLONEBOT_WS_PORT:-3001}:3001"
    volumes:
      - qq_volume:/root/.config/QQ
      - ./data/llonebot:/app/llbot/data:Z
    networks:
      - app_network
    depends_on:
      - pmhq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "ps | grep '[n]ode'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  voice-asr:
    build:
      context: ./docker/voice-asr
    image: qqbot-voice-asr:local
    container_name: qqbot-voice-asr
    environment:
      VOICE_ASR_HOST: 0.0.0.0
      VOICE_ASR_PORT: 8080
      VOICE_ASR_MODEL: ${VOICE_ASR_MODEL:-small}
      VOICE_ASR_COMPUTE_TYPE: ${VOICE_ASR_COMPUTE_TYPE:-int8}
      VOICE_ASR_API_KEY: ${QQ_VOICE_ASR_API_KEY:-}
      VOICE_ASR_CACHE_DIR: /data/voice/asr/cache
      VOICE_ASR_MAX_SECONDS: ${QQ_VOICE_INPUT_MAX_SECONDS:-60}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${VOICE_ASR_PORT:-5161}:8080"
    volumes:
      - ./data/voice/asr:/data/voice/asr:Z
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  voice-tts:
    build:
      context: ./docker/voice-tts
    image: qqbot-voice-tts:local
    container_name: qqbot-voice-tts
    environment:
      VOICE_TTS_HOST: 0.0.0.0
      VOICE_TTS_PORT: 8080
      VOICE_TTS_INTERNAL_HOST: 127.0.0.1
      VOICE_TTS_INTERNAL_PORT: 9880
      VOICE_TTS_API_KEY: ${QQ_VOICE_TTS_API_KEY:-}
      VOICE_TTS_DATA_DIR: /data/voice/tts
      VOICE_TTS_CONFIG_PATH: /data/voice/tts/configs/tts_infer.yaml
      VOICE_TTS_VERSION: ${VOICE_TTS_VERSION:-v2ProPlus}
      VOICE_TTS_GPT_WEIGHTS: ${VOICE_TTS_GPT_WEIGHTS:-/data/voice/tts/models/sakiko_v2pp-e15.ckpt}
      VOICE_TTS_SOVITS_WEIGHTS: ${VOICE_TTS_SOVITS_WEIGHTS:-/data/voice/tts/models/sakiko_v2pp_e8_s520.pth}
      VOICE_TTS_BERT_BASE: ${VOICE_TTS_BERT_BASE:-/data/voice/tts/pretrained_models/chinese-roberta-wwm-ext-large}
      VOICE_TTS_HUBERT_BASE: ${VOICE_TTS_HUBERT_BASE:-/data/voice/tts/pretrained_models/chinese-hubert-base}
      VOICE_TTS_REF_WHITE: ${VOICE_TTS_REF_WHITE:-/data/voice/tts/references/white_sakiko.wav}
      VOICE_TTS_REF_BLACK: ${VOICE_TTS_REF_BLACK:-/data/voice/tts/references/black_sakiko.wav}
      VOICE_TTS_PROMPT_TEXT_WHITE: ${VOICE_TTS_PROMPT_TEXT_WHITE:-请慢慢说，别着急。}
      VOICE_TTS_PROMPT_TEXT_BLACK: ${VOICE_TTS_PROMPT_TEXT_BLACK:-我的私事，与您无关。}
      VOICE_TTS_PROMPT_LANG: ${VOICE_TTS_PROMPT_LANG:-zh}
      VOICE_TTS_TEXT_LANG: ${VOICE_TTS_TEXT_LANG:-zh}
      VOICE_TTS_MEDIA_TYPE: ${VOICE_TTS_MEDIA_TYPE:-wav}
      VOICE_TTS_SPLIT_METHOD: ${VOICE_TTS_SPLIT_METHOD:-cut5}
      VOICE_TTS_BATCH_SIZE: ${VOICE_TTS_BATCH_SIZE:-1}
      VOICE_TTS_PARALLEL_INFER: ${VOICE_TTS_PARALLEL_INFER:-false}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${VOICE_TTS_PORT:-5162}:8080"
    volumes:
      - ./data/voice/tts:/data/voice/tts:Z
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  qq_volume:
  ollama_data:

networks:
  app_network:
    driver: bridge
