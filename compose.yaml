name: qqbot-stack

services:
  pmhq:
    image: ${PMHQ_IMAGE:-docker.io/linyuchen/pmhq}:${PMHQ_TAG:-latest}
    container_name: pmhq
    privileged: true
    environment:
      ENABLE_HEADLESS: ${ENABLE_HEADLESS:-false}
      AUTO_LOGIN_QQ: ${AUTO_LOGIN_QQ:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - qq_volume:/root/.config/QQ
    ports:
      - "${PMHQ_BIND_HOST:-127.0.0.1}:${PMHQ_PORT:-13000}:13000"
    networks:
      app_network:
        aliases:
          - pmhq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  llbot:
    image: ${LLBOT_IMAGE:-docker.io/linyuchen/llbot}:${LLBOT_TAG:-7.11.0}
    container_name: llonebot
    environment:
      pmhq_host: ${PMHQ_HOST:-pmhq}
      pmhq_port: ${PMHQ_PORT:-13000}
      WEBUI_PORT: ${LLONEBOT_WEBUI_PORT:-3080}
      LLONEBOT_WS_PORT: ${LLONEBOT_WS_PORT:-3001}
      LLONEBOT_DISABLE_WEBUI_AUTH: ${LLONEBOT_DISABLE_WEBUI_AUTH:-true}
      ONEBOT_TOKEN: ${ONEBOT_TOKEN:-}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${LLONEBOT_WEBUI_PORT:-3080}:${LLONEBOT_WEBUI_PORT:-3080}"
      - "127.0.0.1:${LLONEBOT_WS_PORT:-3001}:3001"
    volumes:
      - qq_volume:/root/.config/QQ
      - "${LLONEBOT_DATA_DIR:-./.runtime/llonebot}:/app/llbot/data:Z"
      - ./docker/llonebot-startup.sh:/startup.sh:Z
    command: ["/startup.sh"]
    networks:
      - app_network
    depends_on:
      - pmhq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "ps | grep '[n]ode'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  voice-asr:
    build:
      context: ./docker/voice-asr
    image: qqbot-voice-asr:local
    container_name: qqbot-voice-asr
    environment:
      VOICE_ASR_HOST: 0.0.0.0
      VOICE_ASR_PORT: 8080
      VOICE_ASR_MODEL: ${VOICE_ASR_MODEL:-small}
      VOICE_ASR_COMPUTE_TYPE: ${VOICE_ASR_COMPUTE_TYPE:-int8}
      VOICE_ASR_API_KEY: ${QQ_VOICE_ASR_API_KEY:-}
      VOICE_ASR_CACHE_DIR: /data/voice/asr/cache
      VOICE_ASR_MAX_SECONDS: ${QQ_VOICE_INPUT_MAX_SECONDS:-60}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${VOICE_ASR_PORT:-5161}:8080"
    volumes:
      - ./data/voice/asr:/data/voice/asr:Z
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  qq_volume:

networks:
  app_network:
    name: qqbot-stack_app_network
    driver: bridge
