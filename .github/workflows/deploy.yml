name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Deploy branch/ref (default: main)"
        required: false
        type: string
      chatluna_ref:
        description: "ChatLuna branch/ref (default: repo variable or v1-dev)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-qqbot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    env:
      DEPLOY_PORT: ${{ vars.QQBOT_SERVER_PORT || '22' }}
      DEPLOY_APP_DIR: ${{ vars.QQBOT_SERVER_APP_DIR || '/opt/qqbot/current' }}
      DEPLOY_SHARED_DIR: ${{ vars.QQBOT_SERVER_SHARED_DIR || '/opt/qqbot/shared' }}
      DEPLOY_SYSTEMD_TARGET: ${{ vars.QQBOT_SYSTEMD_TARGET || 'qqbot.target' }}
      DEPLOY_CHATLUNA_REPO: kkkzbh/chatluna
      DEPLOY_CHATLUNA_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.chatluna_ref || 'v1-dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref || github.ref }}
          persist-credentials: false

      - name: Checkout linked ChatLuna
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOY_CHATLUNA_REPO }}
          ref: ${{ env.DEPLOY_CHATLUNA_REF }}
          path: chatluna-src
          persist-credentials: false

      - name: Prepare linked ChatLuna workspace
        run: |
          set -euo pipefail
          ln -sfn "${GITHUB_WORKSPACE}/chatluna-src" "${GITHUB_WORKSPACE}/../chatluna"
          test -f "${GITHUB_WORKSPACE}/../chatluna/packages/core/package.json"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install linked ChatLuna dependencies
        run: |
          set -euo pipefail
          corepack enable
          cd chatluna-src
          test -f yarn.lock || { echo "Missing chatluna-src/yarn.lock for ${DEPLOY_CHATLUNA_REPO}@${DEPLOY_CHATLUNA_REF}; refusing unlocked yarn install." >&2; exit 1; }
          yarn install --frozen-lockfile

      - name: Ensure linked ChatLuna runtime builds
        run: bash ./scripts/ensure-chatluna-build.sh

      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.QQBOT_SSH_PRIVATE_KEY }}
          DEPLOY_DOTENV: ${{ secrets.QQBOT_DOTENV }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing required secret: QQBOT_SERVER_HOST" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_USER}" ]; then
            echo "Missing required secret: QQBOT_SERVER_USER" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_SSH_PRIVATE_KEY}" ]; then
            echo "Missing required secret: QQBOT_SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_DOTENV}" ]; then
            echo "Missing required secret: QQBOT_DOTENV" >&2
            exit 1
          fi

      - name: Quality gates
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm test \
            tests/voice-config.test.ts \
            tests/group-natural-trigger.test.ts \
            tests/chatluna-live-reply.test.ts \
            tests/chatluna-speaker-format.test.ts
          pnpm build

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.QQBOT_SSH_PRIVATE_KEY }}

      - name: Setup known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          SSH_KNOWN_HOSTS: ${{ secrets.QQBOT_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          if [ -n "${SSH_KNOWN_HOSTS}" ]; then
            printf "%s\n" "${SSH_KNOWN_HOSTS}" > "$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" > "$HOME/.ssh/known_hosts"
          fi
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Sync project files
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
        run: |
          set -euo pipefail
          retry_cmd() {
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "${attempt}" -ge 6 ]; then
                return 1
              fi
              sleep "$((attempt * 10))"
              attempt="$((attempt + 1))"
            done
          }
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          RSYNC_RSH="ssh -p ${DEPLOY_PORT} -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          retry_cmd ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_APP_DIR}'"
          retry_cmd rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.server' \
            --exclude='data' \
            --exclude='downloads' \
            --exclude='zpix.ttf' \
            --exclude='koishi-runtime.log' \
            --exclude='chatluna-src' \
            -e "${RSYNC_RSH}" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_APP_DIR}/"

      - name: Sync linked ChatLuna files
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
        run: |
          set -euo pipefail
          retry_cmd() {
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "${attempt}" -ge 6 ]; then
                return 1
              fi
              sleep "$((attempt * 10))"
              attempt="$((attempt + 1))"
            done
          }
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          RSYNC_RSH="ssh -p ${DEPLOY_PORT} -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          DEPLOY_CHATLUNA_DIR="$(dirname "${DEPLOY_APP_DIR}")/chatluna"
          retry_cmd ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_CHATLUNA_DIR}'"
          retry_cmd rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.idea' \
            -e "${RSYNC_RSH}" \
            ./chatluna-src/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_CHATLUNA_DIR}/"

      - name: Prepare server runtime layer
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
        run: |
          set -euo pipefail
          retry_cmd() {
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "${attempt}" -ge 6 ]; then
                return 1
              fi
              sleep "$((attempt * 10))"
              attempt="$((attempt + 1))"
            done
          }
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          retry_cmd ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_APP_DIR='${DEPLOY_APP_DIR}' QQBOT_SHARED_DIR='${DEPLOY_SHARED_DIR}' bash '${DEPLOY_APP_DIR}/scripts/prepare-server-runtime-layer.sh'"

      - name: Sync bundled preset files
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
        run: |
          set -euo pipefail
          retry_cmd() {
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "${attempt}" -ge 6 ]; then
                return 1
              fi
              sleep "$((attempt * 10))"
              attempt="$((attempt + 1))"
            done
          }
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          RSYNC_RSH="ssh -p ${DEPLOY_PORT} -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          if [ -d "./data/chathub/presets" ]; then
            retry_cmd ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_APP_DIR}/data/chathub/presets'"
            retry_cmd rsync -az \
              -e "${RSYNC_RSH}" \
              ./data/chathub/presets/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_APP_DIR}/data/chathub/presets/"
          fi

      - name: Sync sticker files
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
        run: |
          set -euo pipefail
          retry_cmd() {
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "${attempt}" -ge 6 ]; then
                return 1
              fi
              sleep "$((attempt * 10))"
              attempt="$((attempt + 1))"
            done
          }
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          RSYNC_RSH="ssh -p ${DEPLOY_PORT} -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          if [ -d "./data/chathub/stickers" ]; then
            retry_cmd ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "mkdir -p '${DEPLOY_APP_DIR}/data/chathub/stickers'"
            retry_cmd rsync -az \
              -e "${RSYNC_RSH}" \
              ./data/chathub/stickers/ \
              "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_APP_DIR}/data/chathub/stickers/"
          fi

      - name: Sync runtime .env.server
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
          DEPLOY_DOTENV: ${{ secrets.QQBOT_DOTENV }}
        run: |
          set -euo pipefail
          VALIDATE_ENV_FILE="$(mktemp)"
          trap 'rm -f "${VALIDATE_ENV_FILE}"' EXIT
          printf "%s" "${DEPLOY_DOTENV}" > "${VALIDATE_ENV_FILE}"
          node ./scripts/validate-server-voice-env.mjs "${VALIDATE_ENV_FILE}"
          retry_ssh_pipe() {
            local attempt=1
            while true; do
              if printf "%s" "${DEPLOY_DOTENV}" | ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "cat > '${DEPLOY_APP_DIR}/.env.server'"; then
                return 0
              fi
              if [ "${attempt}" -ge 6 ]; then
                return 1
              fi
              sleep "$((attempt * 10))"
              attempt="$((attempt + 1))"
            done
          }
          retry_cmd() {
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "${attempt}" -ge 6 ]; then
                return 1
              fi
              sleep "$((attempt * 10))"
              attempt="$((attempt + 1))"
            done
          }
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          retry_ssh_pipe
          retry_cmd ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "chmod 600 '${DEPLOY_APP_DIR}/.env.server'"

      - name: Install, build and restart service on server
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
        run: |
          set -euo pipefail
          retry_cmd() {
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "${attempt}" -ge 6 ]; then
                return 1
              fi
              sleep "$((attempt * 10))"
              attempt="$((attempt + 1))"
            done
          }
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          retry_cmd ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_APP_DIR='${DEPLOY_APP_DIR}' DEPLOY_SHARED_DIR='${DEPLOY_SHARED_DIR}' DEPLOY_SYSTEMD_TARGET='${DEPLOY_SYSTEMD_TARGET}' bash -s" <<'EOF'
          set -euo pipefail

          APP_DIR="${DEPLOY_APP_DIR}"
          SHARED_DIR="${DEPLOY_SHARED_DIR}"
          CHATLUNA_DIR="$(dirname "${APP_DIR}")/chatluna"
          SYSTEMD_TARGET="${DEPLOY_SYSTEMD_TARGET}"
          USER_SYSTEMD_DIR="${HOME}/.config/systemd/user"

          cd "${APP_DIR}"

          if [ ! -f "${APP_DIR}/.env.server" ]; then
            echo "Missing runtime .env at ${APP_DIR}/.env.server" >&2
            exit 1
          fi

          bash "${APP_DIR}/scripts/install-host-log-policy.sh"

          if ! command -v pnpm >/dev/null 2>&1; then
            if command -v corepack >/dev/null 2>&1; then
              corepack enable
              corepack prepare pnpm@9.15.4 --activate
            fi
          fi

          if ! command -v pnpm >/dev/null 2>&1; then
            echo "pnpm is not installed on target host" >&2
            exit 1
          fi

          if ! command -v google-chrome >/dev/null 2>&1; then
            if ! command -v apt-get >/dev/null 2>&1; then
              echo "google-chrome is missing on target host and automatic .deb install requires apt-get" >&2
              exit 1
            fi

            export DEBIAN_FRONTEND=noninteractive
            if ! command -v wget >/dev/null 2>&1; then
              apt-get update
              apt-get install -y wget
            fi

            CHROME_DEB="/tmp/google-chrome-stable_current_amd64.deb"
            rm -f "${CHROME_DEB}"
            wget -q -O "${CHROME_DEB}" https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            apt-get update
            apt-get install -y "${CHROME_DEB}"
            rm -f "${CHROME_DEB}"
          fi

          apt-get purge -y chromium-browser >/dev/null 2>&1 || true
          if command -v snap >/dev/null 2>&1; then
            snap remove --purge chromium >/dev/null 2>&1 || true
          fi

          chown -R "$(id -u):$(id -g)" "${APP_DIR}" >/dev/null 2>&1 || true
          mkdir -p "${SHARED_DIR}/presets"
          touch "${SHARED_DIR}/.env.runtime"
          chmod 700 "${SHARED_DIR}" "${SHARED_DIR}/presets"
          chmod 600 "${SHARED_DIR}/.env.runtime"
          if [ -d "${CHATLUNA_DIR}" ]; then
            chown -R "$(id -u):$(id -g)" "${CHATLUNA_DIR}" >/dev/null 2>&1 || true
            (
              cd "${CHATLUNA_DIR}"
              if ! command -v corepack >/dev/null 2>&1; then
                echo "corepack is not installed on target host" >&2
                exit 1
              fi
              if [ ! -f "${CHATLUNA_DIR}/yarn.lock" ]; then
                echo "Missing ${CHATLUNA_DIR}/yarn.lock; refusing unlocked yarn install on server" >&2
                exit 1
              fi
              mkdir -p "${CHATLUNA_DIR}/.yarn-cache"
              YARN_CACHE_FOLDER="${CHATLUNA_DIR}/.yarn-cache" corepack yarn install --frozen-lockfile
            )
          fi

          if [ -d "${CHATLUNA_DIR}" ]; then
            CHATLUNA_ROOT_DIR="${CHATLUNA_DIR}" bash "${APP_DIR}/scripts/ensure-chatluna-build.sh"
          fi

          if [ "${SYSTEMD_TARGET}" = "qqbot.target" ]; then
            if ! command -v podman-compose >/dev/null 2>&1; then
              echo "podman-compose is not installed on target host" >&2
              exit 1
            fi

            PODMAN_COMPOSE_BIN="$(command -v podman-compose)"
            PODMAN_NETWORK_NAME="qqbot-stack_app_network"
            mkdir -p "${USER_SYSTEMD_DIR}"

            cat > "${USER_SYSTEMD_DIR}/qqbot-stack.service" <<UNIT
          [Unit]
          Description=QQBot Podman Compose Stack
          After=network-online.target
          Wants=network-online.target
          PartOf=qqbot.target

          [Service]
          Type=oneshot
          KillMode=none
          WorkingDirectory=${APP_DIR}
          EnvironmentFile=${APP_DIR}/.env.server
          EnvironmentFile=-${SHARED_DIR}/.env.runtime
          Environment=CONTAINERS_CONF=${APP_DIR}/config/podman/containers.conf
          Environment=QQBOT_ENV_BASE_FILE=${APP_DIR}/.env.server
          Environment=QQBOT_ENV_OVERRIDE_FILE=${SHARED_DIR}/.env.runtime
          Environment=QQBOT_PODMAN_COMPOSE_BIN=${PODMAN_COMPOSE_BIN}
          Environment=QQBOT_PODMAN_NETWORK_NAME=${PODMAN_NETWORK_NAME}
          Environment=CHATLUNA_PRESET_DIRS=${SHARED_DIR}/presets:${APP_DIR}/data/chathub/presets
          Environment=CHATLUNA_RUNTIME_PRESET_DIR=${SHARED_DIR}/presets
          ExecStartPre=/usr/bin/env bash -lc "podman rm -f qqbot-voice-asr >/dev/null 2>&1 || true"
          ExecStart=/usr/bin/env bash -lc 'cd ${APP_DIR} && ./scripts/podman-stack-up.sh pmhq llbot && ./scripts/verify-pmhq-network.sh'
          ExecStop=${PODMAN_COMPOSE_BIN} -f ${APP_DIR}/compose.yaml stop pmhq llbot
          RemainAfterExit=yes

          [Install]
          WantedBy=qqbot.target
          UNIT

            cat > "${USER_SYSTEMD_DIR}/qqbot-koishi.service" <<UNIT
          [Unit]
          Description=QQBot Koishi Service
          After=network-online.target qqbot-stack.service
          Wants=network-online.target qqbot-stack.service
          PartOf=qqbot.target

          [Service]
          Type=simple
          WorkingDirectory=${APP_DIR}
          EnvironmentFile=${APP_DIR}/.env.server
          EnvironmentFile=-${SHARED_DIR}/.env.runtime
          Environment=QQBOT_ENV_BASE_FILE=${APP_DIR}/.env.server
          Environment=QQBOT_ENV_OVERRIDE_FILE=${SHARED_DIR}/.env.runtime
          Environment=CHATLUNA_PRESET_DIRS=${SHARED_DIR}/presets:${APP_DIR}/data/chathub/presets
          Environment=CHATLUNA_RUNTIME_PRESET_DIR=${SHARED_DIR}/presets
          ExecStart=/usr/bin/env bash -lc 'cd ${APP_DIR} && exec pnpm exec koishi start koishi.yml'
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=qqbot.target
          UNIT

            cat > "${USER_SYSTEMD_DIR}/qqbot.target" <<'UNIT'
          [Unit]
          Description=QQBot Full Stack Target
          Wants=qqbot-stack.service qqbot-koishi.service
          After=qqbot-stack.service

          [Install]
          WantedBy=default.target
          UNIT
          fi

          pnpm install --frozen-lockfile
          pnpm build

          if ! command -v systemctl >/dev/null 2>&1; then
            echo "systemctl is not available on target host" >&2
            exit 1
          fi

          if command -v loginctl >/dev/null 2>&1; then
            if [ "$(id -u)" -eq 0 ]; then
              loginctl enable-linger root >/dev/null 2>&1 || true
            elif command -v sudo >/dev/null 2>&1; then
              sudo -n loginctl enable-linger "$(whoami)" >/dev/null 2>&1 || true
            fi
          fi

          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          if [ ! -S "${XDG_RUNTIME_DIR}/bus" ]; then
            echo "User systemd bus not available. Check loginctl enable-linger and user service setup." >&2
            exit 1
          fi

          systemctl --user daemon-reload
          systemctl --user enable "${SYSTEMD_TARGET}" >/dev/null 2>&1 || true
          systemctl --user restart "${SYSTEMD_TARGET}"
          systemctl --user is-active --quiet "${SYSTEMD_TARGET}"

          if [ "${SYSTEMD_TARGET}" = "qqbot.target" ]; then
            for unit in qqbot-stack.service qqbot-koishi.service; do
              for _ in $(seq 1 150); do
                if systemctl --user is-active --quiet "${unit}"; then
                  break
                fi
                if systemctl --user is-failed --quiet "${unit}"; then
                  systemctl --user status "${unit}" --no-pager >&2 || true
                  exit 1
                fi
                sleep 1
              done
              if ! systemctl --user is-active --quiet "${unit}"; then
                systemctl --user status "${unit}" --no-pager >&2 || true
                exit 1
              fi
            done

            stack_status="$(systemctl --user show qqbot-stack.service -p Result -p ExecMainStatus --no-pager || true)"
            if ! printf "%s\n" "${stack_status}" | grep -Fqx 'Result=success'; then
              systemctl --user status qqbot-stack.service --no-pager >&2 || true
              echo "${stack_status}" >&2
              exit 1
            fi
            if ! printf "%s\n" "${stack_status}" | grep -Fqx 'ExecMainStatus=0'; then
              systemctl --user status qqbot-stack.service --no-pager >&2 || true
              echo "${stack_status}" >&2
              exit 1
            fi

            bash "${APP_DIR}/scripts/verify-pmhq-network.sh"
          fi
          EOF
