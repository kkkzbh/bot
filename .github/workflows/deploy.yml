name: Deploy

on:
  push:
    tags:
      - deploy-*
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: 'Deploy branch/ref (default: current ref)'
        required: false
        type: string
      chatluna_ref:
        description: 'ChatLuna branch/ref (default: v1-dev)'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-qqbot-production
  cancel-in-progress: false

env:
  DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ref || github.ref }}
  DEPLOY_CHATLUNA_REPO: kkkzbh/chatluna
  DEPLOY_CHATLUNA_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.chatluna_ref || 'qqbot-conversation-runtime' }}
  DEPLOY_PORT: ${{ vars.QQBOT_SERVER_PORT || '22' }}
  DEPLOY_APP_DIR: ${{ vars.QQBOT_SERVER_APP_DIR || '/opt/qqbot/current' }}
  DEPLOY_SHARED_DIR: ${{ vars.QQBOT_SERVER_SHARED_DIR || '/opt/qqbot/shared' }}
  DEPLOY_SYSTEMD_TARGET: ${{ vars.QQBOT_SYSTEMD_TARGET || 'qqbot.target' }}

jobs:
  resolve-revisions:
    name: Resolve external revisions
    runs-on: ubuntu-latest
    outputs:
      chatluna-sha: ${{ steps.chatluna.outputs.sha }}
    steps:
      - name: Resolve ChatLuna ref
        id: chatluna
        shell: bash
        run: |
          set -euo pipefail
          repo_url="https://github.com/${DEPLOY_CHATLUNA_REPO}.git"
          ref="${DEPLOY_CHATLUNA_REF}"

          if [[ "${ref}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            sha="${ref}"
          else
            sha="$(git ls-remote --exit-code "${repo_url}" "refs/heads/${ref}" | awk '{print $1; exit}' || true)"
            if [[ -z "${sha}" ]]; then
              sha="$(git ls-remote --exit-code "${repo_url}" "refs/tags/${ref}^{}" | awk '{print $1; exit}' || true)"
            fi
            if [[ -z "${sha}" ]]; then
              sha="$(git ls-remote --exit-code "${repo_url}" "refs/tags/${ref}" | awk '{print $1; exit}' || true)"
            fi
            if [[ -z "${sha}" ]]; then
              sha="$(git ls-remote --exit-code "${repo_url}" "${ref}" | awk '{print $1; exit}' || true)"
            fi
          fi

          if [[ -z "${sha}" ]]; then
            echo "Failed to resolve ${DEPLOY_CHATLUNA_REPO}@${ref}" >&2
            exit 1
          fi

          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          {
            echo "### Resolved revisions"
            echo "- QQBot ref: \`${DEPLOY_REF}\`"
            echo "- ChatLuna: \`${DEPLOY_CHATLUNA_REPO}@${ref}\` -> \`${sha}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  build-release:
    name: Build release bundle
    runs-on: ubuntu-latest
    needs:
      - resolve-revisions
    steps:
      - name: Checkout workflow action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.DEPLOY_REF }}
          persist-credentials: false

      - name: Setup workspace
        id: workspace
        uses: ./.github/actions/setup-qqbot-workspace
        with:
          qqbot-ref: ${{ env.DEPLOY_REF }}
          chatluna-repository: ${{ env.DEPLOY_CHATLUNA_REPO }}
          chatluna-ref: ${{ needs.resolve-revisions.outputs.chatluna-sha }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test -- --reporter=dot

      - name: Build
        run: pnpm build

      - name: Koishi startup smoke test
        env:
          ONEBOT_SELF_ID: '100000001'
          OPENAI_API_KEY: sk-ci-smoke
          OPENAI_MODEL: deepseek/deepseek-chat
          TASK_AUTOMATION_INTENT_ENABLED: 'false'
        run: pnpm smoke:start

      - name: Write build manifest
        env:
          QQBOT_REPOSITORY: ${{ github.repository }}
          QQBOT_REF: ${{ env.DEPLOY_REF }}
          QQBOT_SHA: ${{ steps.workspace.outputs.qqbot-sha }}
          CHATLUNA_REPOSITORY: ${{ env.DEPLOY_CHATLUNA_REPO }}
          CHATLUNA_REF: ${{ env.DEPLOY_CHATLUNA_REF }}
          CHATLUNA_SHA: ${{ steps.workspace.outputs.chatluna-sha }}
        run: node ./scripts/ci/write-build-manifest.mjs --output artifacts/build-manifest.json

      - name: Create deploy bundle
        id: bundle
        run: |
          set -euo pipefail
          bundle_path="$(BUILD_MANIFEST_PATH=artifacts/build-manifest.json CHATLUNA_SOURCE_DIR=chatluna-src bash ./scripts/ci/create-deploy-bundle.sh)"
          echo "bundle-path=${bundle_path}" >> "${GITHUB_OUTPUT}"
          echo "bundle-name=$(basename "${bundle_path}")" >> "${GITHUB_OUTPUT}"

      - name: Upload release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qqbot-release
          if-no-files-found: error
          retention-days: 14
          path: |
            ${{ steps.bundle.outputs.bundle-path }}
            artifacts/build-manifest.json

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - build-release
    environment:
      name: production
    steps:
      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.QQBOT_SSH_PRIVATE_KEY }}
          DEPLOY_DOTENV: ${{ secrets.QQBOT_DOTENV }}
          SSH_KNOWN_HOSTS: ${{ secrets.QQBOT_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_PRIVATE_KEY DEPLOY_DOTENV SSH_KNOWN_HOSTS; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Download release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: qqbot-release
          path: artifacts

      - name: Setup SSH key
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.QQBOT_SSH_PRIVATE_KEY }}

      - name: Setup known_hosts
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.QQBOT_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf "%s\n" "${SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/known_hosts"

      - name: Upload bundle and runtime env
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
          DEPLOY_DOTENV: ${{ secrets.QQBOT_DOTENV }}
        run: |
          set -euo pipefail
          bundle_path="$(find artifacts -maxdepth 1 -type f -name 'qqbot-release-*.tar.gz' -print -quit)"
          if [[ -z "${bundle_path}" ]]; then
            echo "Missing release bundle in artifacts/" >&2
            exit 1
          fi

          remote_base="$(dirname "${DEPLOY_APP_DIR}")"
          remote_incoming="${remote_base}/incoming"
          remote_bundle="${remote_incoming}/$(basename "${bundle_path}")"
          ssh_opts=(-p "${DEPLOY_PORT}" -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)

          ssh "${ssh_opts[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p $(printf '%q' "${remote_incoming}") $(printf '%q' "${DEPLOY_SHARED_DIR}")"
          scp -P "${DEPLOY_PORT}" "${bundle_path}" "${DEPLOY_USER}@${DEPLOY_HOST}:${remote_bundle}"

          tmp_env="${DEPLOY_SHARED_DIR}/.env.server.tmp"
          final_env="${DEPLOY_SHARED_DIR}/.env.server"
          printf "%s" "${DEPLOY_DOTENV}" | ssh "${ssh_opts[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "umask 077; cat > $(printf '%q' "${tmp_env}") && mv $(printf '%q' "${tmp_env}") $(printf '%q' "${final_env}") && chmod 600 $(printf '%q' "${final_env}")"

          {
            echo "REMOTE_BUNDLE=${remote_bundle}"
          } >> "${GITHUB_ENV}"

      - name: Install release on server
        env:
          DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
        run: |
          set -euo pipefail
          ssh_opts=(-p "${DEPLOY_PORT}" -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          remote_base="$(dirname "${DEPLOY_APP_DIR}")"
          remote_tmp="${remote_base}/incoming/install-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          ssh "${ssh_opts[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "QQBOT_RELEASE_BUNDLE=$(printf '%q' "${REMOTE_BUNDLE}") DEPLOY_APP_DIR=$(printf '%q' "${DEPLOY_APP_DIR}") QQBOT_SHARED_DIR=$(printf '%q' "${DEPLOY_SHARED_DIR}") DEPLOY_SYSTEMD_TARGET=$(printf '%q' "${DEPLOY_SYSTEMD_TARGET}") QQBOT_REMOTE_INSTALL_TMP=$(printf '%q' "${remote_tmp}") bash -s" <<'REMOTE'
          set -euo pipefail
          rm -rf "${QQBOT_REMOTE_INSTALL_TMP}"
          mkdir -p "${QQBOT_REMOTE_INSTALL_TMP}"
          cleanup() {
            rm -rf "${QQBOT_REMOTE_INSTALL_TMP}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          tar -xzf "${QQBOT_RELEASE_BUNDLE}" -C "${QQBOT_REMOTE_INSTALL_TMP}"
          bash "${QQBOT_REMOTE_INSTALL_TMP}/qqbot/scripts/deploy/install-release.sh" "${QQBOT_RELEASE_BUNDLE}"
          REMOTE
