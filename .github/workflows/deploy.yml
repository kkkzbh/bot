name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Deploy branch/ref (default: main)"
        required: false
        type: string
      chatluna_ref:
        description: "ChatLuna branch/ref (default: repo variable or v1-dev)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-qqbot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.QQBOT_SERVER_HOST }}
      DEPLOY_USER: ${{ secrets.QQBOT_SERVER_USER }}
      DEPLOY_PORT: ${{ vars.QQBOT_SERVER_PORT || '22' }}
      DEPLOY_APP_DIR: ${{ vars.QQBOT_SERVER_APP_DIR || '/opt/qqbot/current' }}
      DEPLOY_SYSTEMD_TARGET: ${{ vars.QQBOT_SYSTEMD_TARGET || 'qqbot.target' }}
      DEPLOY_CHATLUNA_REPO: ${{ vars.QQBOT_CHATLUNA_REPO || 'kkkzbh/chatluna' }}
      DEPLOY_CHATLUNA_REF: ${{ github.event.inputs.chatluna_ref || vars.QQBOT_CHATLUNA_REF || 'v1-dev' }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.QQBOT_SSH_PRIVATE_KEY }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.QQBOT_SSH_KNOWN_HOSTS }}
      DEPLOY_DOTENV: ${{ secrets.QQBOT_DOTENV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref || github.ref }}

      - name: Checkout linked ChatLuna
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOY_CHATLUNA_REPO }}
          ref: ${{ env.DEPLOY_CHATLUNA_REF }}
          path: chatluna-src

      - name: Prepare linked ChatLuna workspace
        run: |
          set -euo pipefail
          ln -sfn "${GITHUB_WORKSPACE}/chatluna-src" "${GITHUB_WORKSPACE}/../chatluna"
          test -f "${GITHUB_WORKSPACE}/../chatluna/packages/core/package.json"

      - name: Install linked ChatLuna dependencies
        run: |
          set -euo pipefail
          corepack enable
          cd chatluna-src
          yarn install --frozen-lockfile

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing required secret: QQBOT_SERVER_HOST" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_USER}" ]; then
            echo "Missing required secret: QQBOT_SERVER_USER" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_SSH_PRIVATE_KEY}" ]; then
            echo "Missing required secret: QQBOT_SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_DOTENV}" ]; then
            echo "Missing required secret: QQBOT_DOTENV" >&2
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Quality gates
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm test \
            tests/voice-config.test.ts \
            tests/group-natural-trigger.test.ts \
            tests/chatluna-live-reply.test.ts \
            tests/chatluna-speaker-format.test.ts
          pnpm build

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Setup known_hosts
        env:
          SSH_KNOWN_HOSTS: ${{ env.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          if [ -n "${SSH_KNOWN_HOSTS}" ]; then
            printf "%s\n" "${SSH_KNOWN_HOSTS}" > "$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" > "$HOME/.ssh/known_hosts"
          fi
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Sync project files
        run: |
          set -euo pipefail
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          RSYNC_RSH="ssh -p ${DEPLOY_PORT} -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_APP_DIR}'"
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.server' \
            --exclude='data' \
            --exclude='downloads' \
            --exclude='zpix.ttf' \
            --exclude='koishi-runtime.log' \
            --exclude='chatluna-src' \
            -e "${RSYNC_RSH}" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_APP_DIR}/"

      - name: Sync linked ChatLuna files
        run: |
          set -euo pipefail
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          RSYNC_RSH="ssh -p ${DEPLOY_PORT} -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          DEPLOY_CHATLUNA_DIR="$(dirname "${DEPLOY_APP_DIR}")/chatluna"
          ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_CHATLUNA_DIR}'"
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.idea' \
            -e "${RSYNC_RSH}" \
            ./chatluna-src/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_CHATLUNA_DIR}/"

      - name: Sync bundled preset files
        run: |
          set -euo pipefail
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          RSYNC_RSH="ssh -p ${DEPLOY_PORT} -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          if [ -d "./data/chathub/presets" ]; then
            ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_APP_DIR}/data/chathub/presets'"
            rsync -az \
              -e "${RSYNC_RSH}" \
              ./data/chathub/presets/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_APP_DIR}/data/chathub/presets/"
          fi

      - name: Sync sticker files
        run: |
          set -euo pipefail
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          RSYNC_RSH="ssh -p ${DEPLOY_PORT} -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          if [ -d "./data/chathub/stickers" ]; then
            ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "mkdir -p '${DEPLOY_APP_DIR}/data/chathub/stickers'"
            rsync -az \
              -e "${RSYNC_RSH}" \
              ./data/chathub/stickers/ \
              "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_APP_DIR}/data/chathub/stickers/"
          fi

      - name: Sync runtime .env.server
        run: |
          set -euo pipefail
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          printf "%s" "${DEPLOY_DOTENV}" | ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "cat > '${DEPLOY_APP_DIR}/.env.server'"
          ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "chmod 600 '${DEPLOY_APP_DIR}/.env.server'"

      - name: Install, build and restart service on server
        run: |
          set -euo pipefail
          SSH_OPTS=(-p "${DEPLOY_PORT}" -o ConnectTimeout=10 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_APP_DIR='${DEPLOY_APP_DIR}' DEPLOY_SYSTEMD_TARGET='${DEPLOY_SYSTEMD_TARGET}' bash -s" <<'EOF'
          set -euo pipefail

          APP_DIR="${DEPLOY_APP_DIR}"
          SYSTEMD_TARGET="${DEPLOY_SYSTEMD_TARGET}"
          USER_SYSTEMD_DIR="${HOME}/.config/systemd/user"

          cd "${APP_DIR}"

          if [ ! -f "${APP_DIR}/.env.server" ]; then
            echo "Missing runtime .env at ${APP_DIR}/.env.server" >&2
            exit 1
          fi

          bash "${APP_DIR}/scripts/install-host-log-policy.sh"

          if ! command -v pnpm >/dev/null 2>&1; then
            if command -v corepack >/dev/null 2>&1; then
              corepack enable
              corepack prepare pnpm@9.15.4 --activate
            fi
          fi

          if ! command -v pnpm >/dev/null 2>&1; then
            echo "pnpm is not installed on target host" >&2
            exit 1
          fi

          if [ "${SYSTEMD_TARGET}" = "qqbot.target" ]; then
            if ! command -v podman-compose >/dev/null 2>&1; then
              echo "podman-compose is not installed on target host" >&2
              exit 1
            fi

            mkdir -p "${USER_SYSTEMD_DIR}"

            cat > "${USER_SYSTEMD_DIR}/qqbot-stack.service" <<UNIT
          [Unit]
          Description=QQBot Podman Compose Stack
          After=network-online.target
          Wants=network-online.target
          PartOf=qqbot.target

          [Service]
          Type=oneshot
          WorkingDirectory=${APP_DIR}
          Environment=CONTAINERS_CONF=${APP_DIR}/config/podman/containers.conf
          ExecStart=/usr/bin/podman-compose -f ${APP_DIR}/compose.yaml up -d --build --force-recreate
          ExecStop=/usr/bin/podman-compose -f ${APP_DIR}/compose.yaml stop
          RemainAfterExit=yes

          [Install]
          WantedBy=qqbot.target
          UNIT

            cat > "${USER_SYSTEMD_DIR}/qqbot-koishi.service" <<UNIT
          [Unit]
          Description=QQBot Koishi Service
          After=network-online.target qqbot-stack.service
          Wants=network-online.target qqbot-stack.service
          PartOf=qqbot.target

          [Service]
          Type=simple
          WorkingDirectory=${APP_DIR}
          EnvironmentFile=${APP_DIR}/.env.server
          ExecStart=/usr/bin/env bash -lc 'cd ${APP_DIR} && QQBOT_ENV_FILE=${APP_DIR}/.env.server pnpm start'
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=qqbot.target
          UNIT

            cat > "${USER_SYSTEMD_DIR}/qqbot.target" <<'UNIT'
          [Unit]
          Description=QQBot Full Stack Target
          Wants=qqbot-stack.service qqbot-koishi.service
          After=qqbot-stack.service

          [Install]
          WantedBy=default.target
          UNIT
          fi

          pnpm install --frozen-lockfile
          pnpm build

          if ! command -v systemctl >/dev/null 2>&1; then
            echo "systemctl is not available on target host" >&2
            exit 1
          fi

          if command -v loginctl >/dev/null 2>&1; then
            if [ "$(id -u)" -eq 0 ]; then
              loginctl enable-linger root >/dev/null 2>&1 || true
            elif command -v sudo >/dev/null 2>&1; then
              sudo -n loginctl enable-linger "$(whoami)" >/dev/null 2>&1 || true
            fi
          fi

          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          if [ ! -S "${XDG_RUNTIME_DIR}/bus" ]; then
            echo "User systemd bus not available. Check loginctl enable-linger and user service setup." >&2
            exit 1
          fi

          systemctl --user daemon-reload
          systemctl --user enable "${SYSTEMD_TARGET}" >/dev/null 2>&1 || true
          systemctl --user restart "${SYSTEMD_TARGET}"
          systemctl --user is-active --quiet "${SYSTEMD_TARGET}"
          EOF
