name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck + Test + Build + Smoke
    runs-on: ubuntu-latest
    env:
      CHATLUNA_REPO: kkkzbh/chatluna
      CHATLUNA_REF: v1-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout linked ChatLuna
        uses: actions/checkout@v6
        with:
          repository: ${{ env.CHATLUNA_REPO }}
          ref: ${{ env.CHATLUNA_REF }}
          path: chatluna-src
          persist-credentials: false

      - name: Prepare linked ChatLuna workspace
        run: |
          set -euo pipefail
          ln -sfn "${GITHUB_WORKSPACE}/chatluna-src" "${GITHUB_WORKSPACE}/../chatluna"
          test -f "${GITHUB_WORKSPACE}/../chatluna/packages/core/package.json"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install linked ChatLuna dependencies
        run: |
          set -euo pipefail
          cd chatluna-src
          COREPACK_ENABLE_PROJECT_SPEC=0 corepack yarn@1.22.22 install --frozen-lockfile

      - name: Ensure linked ChatLuna runtime builds
        run: bash ./scripts/ensure-chatluna-build.sh

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Task automation regression tests
        run: pnpm test -- tests/task-automation-llm.test.ts

      - name: Task automation context regression tests
        run: pnpm test -- tests/qbot-context-scenarios.test.ts tests/task-automation.test.ts

      - name: Build
        run: pnpm build

      - name: Koishi startup smoke test
        env:
          ONEBOT_SELF_ID: "100000001"
          OPENAI_API_KEY: "sk-ci-smoke"
          OPENAI_MODEL: "deepseek/deepseek-chat"
          TASK_AUTOMATION_INTENT_ENABLED: "false"
        run: pnpm smoke:start

      - name: Koishi startup smoke test (delivery model config)
        env:
          ONEBOT_SELF_ID: "100000001"
          OPENAI_API_KEY: "sk-ci-smoke"
          OPENAI_MODEL: "deepseek/deepseek-chat"
          TASK_AUTOMATION_INTENT_ENABLED: "false"
          TASK_AUTOMATION_DELIVERY_MODEL: "deepseek-reasoner"
          TASK_AUTOMATION_CHAT_REPLY_MODEL: "deepseek-reasoner"
          TASK_AUTOMATION_DELIVERY_TIMEOUT_MS: "18000"
          TASK_AUTOMATION_CHAT_REPLY_TIMEOUT_MS: "12000"
        run: pnpm smoke:start
