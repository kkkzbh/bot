name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CHATLUNA_REPO: kkkzbh/chatluna
  CHATLUNA_REF: qqbot-conversation-runtime

jobs:
  resolve-revisions:
    name: Resolve external revisions
    runs-on: ubuntu-latest
    outputs:
      chatluna-sha: ${{ steps.chatluna.outputs.sha }}
    steps:
      - name: Resolve ChatLuna ref
        id: chatluna
        shell: bash
        run: |
          set -euo pipefail
          repo_url="https://github.com/${CHATLUNA_REPO}.git"
          ref="${CHATLUNA_REF}"

          if [[ "${ref}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            sha="${ref}"
          else
            sha="$(git ls-remote --exit-code "${repo_url}" "refs/heads/${ref}" | awk '{print $1; exit}' || true)"
            if [[ -z "${sha}" ]]; then
              sha="$(git ls-remote --exit-code "${repo_url}" "refs/tags/${ref}^{}" | awk '{print $1; exit}' || true)"
            fi
            if [[ -z "${sha}" ]]; then
              sha="$(git ls-remote --exit-code "${repo_url}" "refs/tags/${ref}" | awk '{print $1; exit}' || true)"
            fi
            if [[ -z "${sha}" ]]; then
              sha="$(git ls-remote --exit-code "${repo_url}" "${ref}" | awk '{print $1; exit}' || true)"
            fi
          fi

          if [[ -z "${sha}" ]]; then
            echo "Failed to resolve ${CHATLUNA_REPO}@${ref}" >&2
            exit 1
          fi

          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          {
            echo "### Resolved revisions"
            echo "- ChatLuna: \`${CHATLUNA_REPO}@${ref}\` -> \`${sha}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  unit:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    needs:
      - resolve-revisions
    steps:
      - name: Checkout workflow action
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup workspace
        uses: ./.github/actions/setup-qqbot-workspace
        with:
          chatluna-repository: ${{ env.CHATLUNA_REPO }}
          chatluna-ref: ${{ needs.resolve-revisions.outputs.chatluna-sha }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test -- --reporter=dot

  build-smoke:
    name: Build + Koishi smoke
    runs-on: ubuntu-latest
    needs:
      - resolve-revisions
    steps:
      - name: Checkout workflow action
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup workspace
        uses: ./.github/actions/setup-qqbot-workspace
        with:
          chatluna-repository: ${{ env.CHATLUNA_REPO }}
          chatluna-ref: ${{ needs.resolve-revisions.outputs.chatluna-sha }}

      - name: Build
        run: pnpm build

      - name: Koishi startup smoke test
        env:
          ONEBOT_SELF_ID: '100000001'
          OPENAI_API_KEY: sk-ci-smoke
          OPENAI_MODEL: deepseek/deepseek-chat
          TASK_AUTOMATION_INTENT_ENABLED: 'false'
        run: pnpm smoke:start

      - name: Koishi startup smoke test (delivery model config)
        env:
          ONEBOT_SELF_ID: '100000001'
          OPENAI_API_KEY: sk-ci-smoke
          OPENAI_MODEL: deepseek/deepseek-chat
          TASK_AUTOMATION_INTENT_ENABLED: 'false'
          TASK_AUTOMATION_DELIVERY_MODEL: deepseek-reasoner
          TASK_AUTOMATION_CHAT_REPLY_MODEL: deepseek-reasoner
          TASK_AUTOMATION_DELIVERY_TIMEOUT_MS: '18000'
          TASK_AUTOMATION_CHAT_REPLY_TIMEOUT_MS: '12000'
        run: pnpm smoke:start
