plugins:
  group:entry:
    $collapsed: true
    http:main: {}
    adapter-onebot:onebot:
      protocol: ws
      selfId: ${{ env.ONEBOT_SELF_ID }}
      token: ${{ env.ONEBOT_TOKEN || '' }}
      endpoint: ${{ env.ONEBOT_WS_ENDPOINT || 'ws://127.0.0.1:3001' }}
    server:0b8t2q:
      host: ${{ env.KOISHI_HOST || '0.0.0.0' }}
      port: ${{ +env.KOISHI_PORT || 5140 }}
    console:9xw6ka:
      open: false
      uiPath: ${{ env.KOISHI_CONSOLE_UI_PATH || '/console' }}
    database-sqlite:8jr5yp:
      path: ${{ env.SQLITE_PATH || './data/koishi.db' }}
    status:console-status: {}
    analytics:console-analytics: {}
    config:console-config: {}
    market:console-market:
      search:
        endpoint: https://registry.koishi.chat/index.json
        timeout: 30000
    sandbox:console-sandbox: {}
    insight:console-insight: {}
    logger:console-logger: {}
    ./dist/plugins/feature-policy:feature-policy: {}
    ./dist/plugins/tool-policy:tool-policy: {}
    ./dist/plugins/bot-console:bot-console: {}
    cron:task: {}
    ./dist/plugins/automation:automation:
      pollIntervalMs: ${{ +env.TASK_AUTOMATION_POLL_MS || 30000 }}
      maxJobsPerUser: ${{ +env.TASK_AUTOMATION_MAX_TASKS_PER_USER || 20 }}
    ./dist/plugins/reply:voice:
      inputEnabled: ${{ env.QQ_VOICE_INPUT_ENABLED !== 'false' }}
      outputEnabled: ${{ env.QQ_VOICE_OUTPUT_ENABLED !== 'false' }}
      asrBaseUrl: ${{ env.QQ_VOICE_ASR_BASE_URL || '' }}
      asrApiKey: ${{ env.QQ_VOICE_ASR_API_KEY || '' }}
      ttsBaseUrl: ${{ env.QQ_VOICE_TTS_BASE_URL || '' }}
      ttsApiKey: ${{ env.QQ_VOICE_TTS_API_KEY || '' }}
      inputMaxSeconds: ${{ +env.QQ_VOICE_INPUT_MAX_SECONDS || 60 }}
      outputMaxWords: ${{ +env.QQ_VOICE_OUTPUT_MAX_WORDS || 80 }}
      outputMaxSeconds: ${{ +env.QQ_VOICE_OUTPUT_MAX_SECONDS || 45 }}
      voiceOutputLanguage: ${{ env.QQ_VOICE_OUTPUT_LANGUAGE }}
      transcribeTimeoutMs: ${{ +env.QQ_VOICE_TRANSCRIBE_TIMEOUT_MS || 45000 }}
      synthTimeoutMs: ${{ +env.QQ_VOICE_SYNTH_TIMEOUT_MS || 300000 }}
      replyInterruptCollectWindowMs: ${{ +env.QQBOT_REPLY_COLLECT_WINDOW_MS || 400 }}
      replyInterruptMaxPendingInputs: ${{ +env.QQBOT_REPLY_MAX_PENDING_INPUTS || 8 }}
    ./dist/plugins/realtime-message:realtime-message:
      maxInjectCount: ${{ +env.QQBOT_REALTIME_MESSAGE_MAX_INJECT_COUNT || 12 }}
    ./dist/plugins/oj-tools:oj-tools:
      cacheTtlMs: ${{ +env.QQBOT_OJ_TOOLS_CACHE_TTL_MS || 300000 }}
      requestIntervalMs: ${{ +env.QQBOT_OJ_TOOLS_REQUEST_INTERVAL_MS || 2100 }}
      ratingChartWidth: ${{ +env.QQBOT_OJ_TOOLS_RATING_CHART_WIDTH || 1789 }}
      ratingChartHeight: ${{ +env.QQBOT_OJ_TOOLS_RATING_CHART_HEIGHT || 838 }}
    ./dist/plugins/triggers/group-natural:natural-trigger:
      enabled: ${{ env.CHAT_NATURAL_TRIGGER_ENABLED === 'true' }}
      enabledGroups: ${{ env.CHAT_NATURAL_TRIGGER_GROUPS || '' }}
      aliases: >-
        ${{ env.CHAT_NATURAL_TRIGGER_ALIASES || '祥子,祥,丰川,丰川祥子,saki,saki酱,sakiko'
        }}
      directTriggerProbability: ${{ +env.CHAT_NATURAL_TRIGGER_DIRECT_PROBABILITY || 0.25 }}
      focusWindowMs: ${{ +env.CHAT_NATURAL_TRIGGER_FOCUS_WINDOW_MS || 300000 }}
      replyIntervalMs: ${{ +env.CHAT_NATURAL_TRIGGER_REPLY_INTERVAL_MS || 2000 }}
      spamWindowMs: ${{ +env.CHAT_NATURAL_TRIGGER_SPAM_WINDOW_MS || 10000 }}
      spamThreshold: ${{ +env.CHAT_NATURAL_TRIGGER_SPAM_THRESHOLD || 10 }}
      spamMuteMs: ${{ +env.CHAT_NATURAL_TRIGGER_SPAM_MUTE_MS || 180000 }}
      decisionEnabled: ${{ env.CHAT_NATURAL_TRIGGER_DECISION_ENABLED !== 'false' }}
      decisionBaseUrl: >-
        ${{ env.CHAT_NATURAL_TRIGGER_DECISION_BASE_URL || env.OPENAI_BASE_URL ||
        'https://api.deepseek.com/v1' }}
      decisionApiKey: >-
        ${{ env.CHAT_NATURAL_TRIGGER_DECISION_API_KEY || env.OPENAI_API_KEY ||
        '' }}
      decisionModel: ${{ env.CHAT_NATURAL_TRIGGER_DECISION_MODEL || env.OPENAI_MODEL || '' }}
      decisionTimeoutMs: ${{ +env.CHAT_NATURAL_TRIGGER_DECISION_TIMEOUT_MS || 4000 }}
      decisionMinConfidence: ${{ +env.CHAT_NATURAL_TRIGGER_DECISION_MIN_CONFIDENCE || 0.62 }}
    chatluna:0qm1bk:
      botNames:
        - 祥子
        - 祥
        - 丰川
        - 丰川祥子
        - saki
        - saki酱
        - sakiko
        - 小祥
      isNickNameWithContent: true
      sendThinkingMessage: false
      defaultModel: openai/gemini-3.1-pro-preview
      defaultPreset: sakiko
      isLog: true
    chatluna-storage-service:attachment-storage:
      storageBackend: local
      serverPath: ${{ env.CHATLUNA_STORAGE_SERVER_PATH || 'http://127.0.0.1:5140' }}
      storagePath: ${{ env.CHATLUNA_STORAGE_PATH || './data/chatluna-storage' }}
      backendPath: ${{ env.CHATLUNA_STORAGE_BACKEND_PATH || '/chatluna-storage' }}
      tempCacheTime: ${{ +env.CHATLUNA_STORAGE_TEMP_CACHE_HOURS || 720 }}
      maxStorageSize: ${{ +env.CHATLUNA_STORAGE_MAX_MB || 2048 }}
      maxStorageCount: ${{ +env.CHATLUNA_STORAGE_MAX_FILES || 2000 }}
    chatluna-openai-like-adapter:0o3zho:
      platform: ${{ env.CHATLUNA_PLATFORM || 'siliconflow' }}
      nonStreaming: true
      pullModels: '${{ env.CHATLUNA_PLATFORM === ''mimo'' ? false : true }}'
      maxContextRatio: ${{ +env.CHATLUNA_MAX_CONTEXT_RATIO || 0.35 }}
      apiKeys:
        - - ${{ env.CHATLUNA_API_KEY || '' }}
          - ${{ env.CHATLUNA_BASE_URL || 'https://api.siliconflow.cn/v1' }}
          - true
      additionalModels: >-
        ${{ env.CHATLUNA_PLATFORM === 'mimo' ? [ { model: 'mimo-v2.5-pro',
        modelType: 'LLM 大语言模型', modelCapabilities: ['tool_call'], contextSize:
        128000 }, { model: 'mimo-v2.5', modelType: 'LLM 大语言模型',
        modelCapabilities: ['tool_call'], contextSize: 128000 }, { model:
        'mimo-v2-pro', modelType: 'LLM 大语言模型', modelCapabilities: ['tool_call'],
        contextSize: 128000 }, { model: 'mimo-v2-omni', modelType: 'LLM 大语言模型',
        modelCapabilities: ['tool_call'], contextSize: 128000 } ] : [] }}
    puppeteer:0vx5c7: {}
    chatluna-search-service:search:
      enabled: ${{ env.CHATLUNA_SEARCH_SERVICE_ENABLED !== 'false' }}
      searchEngine:
        - tavily
      topK: ${{ +env.CHATLUNA_SEARCH_SERVICE_TOPK || 5 }}
      summaryType: ${{ env.CHATLUNA_SEARCH_SERVICE_SUMMARY_TYPE || 'balanced' }}
      summaryModel: ${{ env.CHATLUNA_SEARCH_SERVICE_SUMMARY_MODEL || 'empty' }}
      tavilyApiKey: ${{ env.CHATLUNA_SEARCH_SERVICE_TAVILY_API_KEY || '' }}
    ./dist/plugins/sticker:sticker:
      stickerDir: ${{ env.CHATLUNA_STICKER_DIR || './data/chathub/stickers' }}
    ./dist/plugins/attachment:attachment:
      maxInjectCount: ${{ +env.QQBOT_ATTACHMENT_MAX_INJECT_COUNT || 5 }}
      maxInjectTotalBytes: ${{ +env.QQBOT_ATTACHMENT_MAX_INJECT_TOTAL_BYTES || 16777216 }}
      maxInjectPerFileBytes: ${{ +env.QQBOT_ATTACHMENT_MAX_INJECT_PER_FILE_BYTES || 6291456 }}
      maxPdfPreviewPagesPerFile: ${{ +env.QQBOT_ATTACHMENT_MAX_PDF_PREVIEW_PAGES_PER_FILE || 6 }}
      maxPdfPreviewPagesTotal: ${{ +env.QQBOT_ATTACHMENT_MAX_PDF_PREVIEW_PAGES_TOTAL || 15 }}
      maxTextCharsPerFile: ${{ +env.QQBOT_ATTACHMENT_MAX_TEXT_CHARS_PER_FILE || 24000 }}
      recentCatalogSize: ${{ +env.QQBOT_ATTACHMENT_RECENT_CATALOG_SIZE || 12 }}
      historyWindow: ${{ +env.QQBOT_ATTACHMENT_HISTORY_WINDOW || 80 }}
      historyTriggerCount: ${{ +env.QQBOT_ATTACHMENT_HISTORY_TRIGGER_COUNT || 120 }}
      historyTokenRatio: ${{ +env.QQBOT_ATTACHMENT_HISTORY_TOKEN_RATIO || 0.7 }}
      projectionTextChars: ${{ +env.QQBOT_ATTACHMENT_PROJECTION_TEXT_CHARS || 1200 }}
      replayTextChars: ${{ +env.QQBOT_ATTACHMENT_REPLAY_TEXT_CHARS || 4000 }}
      replayMaxRefs: ${{ +env.QQBOT_ATTACHMENT_REPLAY_MAX_REFS || 5 }}
      voiceAsrBaseUrl: ${{ env.QQ_VOICE_ASR_BASE_URL || '' }}
      voiceAsrApiKey: ${{ env.QQ_VOICE_ASR_API_KEY || '' }}
      voiceTranscribeTimeoutMs: ${{ +env.QQ_VOICE_TRANSCRIBE_TIMEOUT_MS || 45000 }}
    chatluna-plugin-common:qf1a6x:
      think: ${{ env.CHATLUNA_COMMON_THINK === 'true' }}
      send: ${{ env.CHATLUNA_COMMON_SEND === 'true' }}
      todos: ${{ env.CHATLUNA_COMMON_TODOS === 'true' }}
      chat: ${{ env.CHATLUNA_COMMON_CHAT === 'true' }}
      request: ${{ env.CHATLUNA_COMMON_REQUEST !== 'false' }}
      requestMaxOutputLength: ${{ +env.CHATLUNA_COMMON_REQUEST_MAX_OUTPUT_LENGTH || 58600 }}
      fs: ${{ env.CHATLUNA_COMMON_FS === 'true' }}
      fsScopePath: ${{ env.CHATLUNA_COMMON_FS_SCOPE_PATH || '' }}
      command: ${{ env.CHATLUNA_COMMON_COMMAND === 'true' }}
      commandAutoExecute: ${{ env.CHATLUNA_COMMON_COMMAND_AUTO_EXECUTE === 'true' }}
      cron: ${{ env.CHATLUNA_COMMON_CRON === 'true' }}
      group: ${{ env.CHATLUNA_COMMON_GROUP === 'true' }}
      actions: ${{ env.CHATLUNA_COMMON_ACTIONS === 'true' }}
      actionsList:
        - name: weather.geo
          description: 根据城市名称查询经纬度，用于后续天气/未来预报查询。
          headers: {}
          selector:
            - 天气
            - 预报
            - 城市
            - weather
            - forecast
          openAPISpec: |-
            openapi: 3.0.3
            info:
              title: Open-Meteo Geocoding API
              version: 1.0.0
            servers:
              - url: https://geocoding-api.open-meteo.com
            paths:
              /v1/search:
                get:
                  summary: Search city coordinates
                  parameters:
                    - in: query
                      name: name
                      required: true
                      schema:
                        type: string
                    - in: query
                      name: count
                      required: false
                      schema:
                        type: integer
                        default: 1
                    - in: query
                      name: language
                      required: false
                      schema:
                        type: string
                        default: zh
                    - in: query
                      name: format
                      required: false
                      schema:
                        type: string
                        default: json
                  responses:
                    "200":
                      description: OK
        - name: weather.forecast
          description: 根据经纬度查询未来天气预报（按天）。
          headers: {}
          selector:
            - 天气
            - 未来
            - 预报
            - weather
            - forecast
          openAPISpec: |-
            openapi: 3.0.3
            info:
              title: Open-Meteo Forecast API
              version: 1.0.0
            servers:
              - url: https://api.open-meteo.com
            paths:
              /v1/forecast:
                get:
                  summary: Get daily weather forecast
                  parameters:
                    - in: query
                      name: latitude
                      required: true
                      schema:
                        type: number
                    - in: query
                      name: longitude
                      required: true
                      schema:
                        type: number
                    - in: query
                      name: daily
                      required: false
                      schema:
                        type: string
                        default: weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max
                    - in: query
                      name: forecast_days
                      required: false
                      schema:
                        type: integer
                        default: 7
                    - in: query
                      name: timezone
                      required: false
                      schema:
                        type: string
                        default: Asia/Shanghai
                  responses:
                    "200":
                      description: OK
      draw: false
      music: false
    chatluna-agent:computer-agent: {}
    chatluna-mcp-client:aq3m2y:
      servers: '{"mcpServers":{}}'
      tools: {}
    ./dist/plugins/model-guard:mjddgg: {}
    ./dist/plugins/affinity:affinity:
      enabled: ${{ env.AFFINITY_ENABLED !== 'false' }}
      proactiveEnabled: ${{ env.AFFINITY_PROACTIVE_ENABLED !== 'false' }}
      pollIntervalMs: ${{ +env.AFFINITY_POLL_INTERVAL_MS || 60000 }}
      randomWindowStartHour: ${{ +env.AFFINITY_RANDOM_WINDOW_START_HOUR || 8 }}
      randomWindowEndHour: ${{ +env.AFFINITY_RANDOM_WINDOW_END_HOUR || 22 }}
    ./dist/plugins/memory:memory:
      enabled: ${{ env.MEMORY_ENABLED !== 'false' }}
      readEnabled: ${{ env.MEMORY_READ_ENABLED !== 'false' }}
      writeEnabled: ${{ env.MEMORY_WRITE_ENABLED !== 'false' }}
      extractBaseUrl: ${{ env.MEMORY_EXTRACT_BASE_URL || '' }}
      extractApiKey: ${{ env.MEMORY_EXTRACT_API_KEY || '' }}
      extractModel: ${{ env.MEMORY_EXTRACT_MODEL || '' }}
      extractTimeoutMs: ${{ +env.MEMORY_EXTRACT_TIMEOUT_MS || 180000 }}
      extractRequestMode: ${{ env.MEMORY_EXTRACT_REQUEST_MODE || 'chat_completions' }}
      extractStructuredOutputProtocol: ${{ env.MEMORY_EXTRACT_STRUCTURED_OUTPUT_PROTOCOL || 'chat_reply_v1' }}
      extractSupportsJsonMode: ${{ env.MEMORY_EXTRACT_SUPPORTS_JSON_MODE === 'true' }}
      embedBaseUrl: ${{ env.MEMORY_EMBED_BASE_URL || 'https://api.siliconflow.cn/v1' }}
      embedApiKey: ${{ env.MEMORY_EMBED_API_KEY || '' }}
      embedModel: ${{ env.MEMORY_EMBED_MODEL || 'Qwen/Qwen3-Embedding-8B' }}
      embedTimeoutMs: ${{ +env.MEMORY_EMBED_TIMEOUT_MS || 12000 }}
      queryTopK: ${{ +env.MEMORY_QUERY_TOPK || 8 }}
      promptBudgetTokens: ${{ +env.MEMORY_PROMPT_BUDGET_TOKENS || 1200 }}
      embedBatchSize: ${{ +env.MEMORY_EMBED_BATCH_SIZE || 16 }}
      extractIdleMs: ${{ +env.MEMORY_EXTRACT_IDLE_MS || 90000 }}
      extractMessageBatch: ${{ +env.MEMORY_EXTRACT_MESSAGE_BATCH || 12 }}
      archiveDays: ${{ +env.MEMORY_ARCHIVE_DAYS || 90 }}
      maxJobRetries: ${{ +env.MEMORY_MAX_JOB_RETRIES || 5 }}
      jobLockTimeoutMs: ${{ +env.MEMORY_JOB_LOCK_TIMEOUT_MS || 300000 }}
      maxFacts: ${{ +env.MEMORY_MAX_FACTS || 8 }}
      maxEpisodes: ${{ +env.MEMORY_MAX_EPISODES || 8 }}
    commands:qp6oxu:
      chatluna:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.room:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.model:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.preset:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.tool:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.mcp:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.auth:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.balance:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
