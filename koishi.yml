plugins:
  group:entry:
    $collapsed: true
    http:main: {}
    adapter-onebot:onebot:
      protocol: ws
      selfId: ${{ env.ONEBOT_SELF_ID }}
      token: ${{ env.ONEBOT_TOKEN || '' }}
      endpoint: ${{ env.ONEBOT_WS_ENDPOINT || 'ws://127.0.0.1:3001' }}
    server:0b8t2q:
      host: ${{ env.KOISHI_HOST || '0.0.0.0' }}
      port: ${{ +env.KOISHI_PORT || 5140 }}
    console:9xw6ka:
      open: false
      uiPath: ${{ env.KOISHI_CONSOLE_UI_PATH || '/console' }}
    database-sqlite:8jr5yp:
      path: ${{ env.SQLITE_PATH || './data/koishi.db' }}
    status:console-status: {}
    analytics:console-analytics: {}
    config:console-config: {}
    market:console-market:
      search:
        endpoint: https://registry.koishi.chat/index.json
        timeout: 30000
    sandbox:console-sandbox: {}
    insight:console-insight: {}
    logger:console-logger: {}
    ./dist/plugins/feature-policy:feature-policy: {}
    ./dist/plugins/tool-policy:tool-policy: {}
    ./dist/plugins/bot-console:bot-console: {}
    cron:task: {}
    ./dist/plugins/automation:automation:
      enabledGroups: ${{ env.CHAT_ENABLED_GROUPS || '' }}
      listenPrivate: ${{ env.TASK_AUTOMATION_LISTEN_PRIVATE !== 'false' }}
      permissionMode: ${{ env.TASK_AUTOMATION_PERMISSION || 'all' }}
      intentEnabled: ${{ env.TASK_AUTOMATION_INTENT_ENABLED !== 'false' }}
      intentMinConfidence: ${{ +env.TASK_AUTOMATION_INTENT_MIN_CONFIDENCE || 0.78 }}
      intentBaseUrl: >-
        ${{ env.TASK_AUTOMATION_INTENT_BASE_URL || env.OPENAI_BASE_URL ||
        'https://api.deepseek.com/v1' }}
      intentApiKey: ${{ env.TASK_AUTOMATION_INTENT_API_KEY || env.OPENAI_API_KEY || '' }}
      intentModel: ${{ env.TASK_AUTOMATION_INTENT_MODEL || env.OPENAI_MODEL || '' }}
      intentTimeoutMs: ${{ +env.TASK_AUTOMATION_INTENT_TIMEOUT_MS || 12000 }}
      pollIntervalMs: ${{ +env.TASK_AUTOMATION_POLL_MS || 30000 }}
      maxTasksPerUser: ${{ +env.TASK_AUTOMATION_MAX_TASKS_PER_USER || 20 }}
      deliveryBaseUrl: >-
        ${{ env.TASK_AUTOMATION_DELIVERY_BASE_URL || env.OPENAI_BASE_URL ||
        'https://api.deepseek.com/v1' }}
      deliveryApiKey: ${{ env.TASK_AUTOMATION_DELIVERY_API_KEY || env.OPENAI_API_KEY || '' }}
      deliveryModel: ${{ env.TASK_AUTOMATION_DELIVERY_MODEL || 'deepseek-reasoner' }}
      deliveryTimeoutMs: ${{ +env.TASK_AUTOMATION_DELIVERY_TIMEOUT_MS || 18000 }}
      deliveryMaxTokens: ${{ +env.TASK_AUTOMATION_DELIVERY_MAX_TOKENS || 10000 }}
      deliverySystemPrompt: ${{ env.TASK_AUTOMATION_DELIVERY_SYSTEM_PROMPT || '' }}
      chatReplyModel: >-
        ${{ env.TASK_AUTOMATION_CHAT_REPLY_MODEL ||
        env.TASK_AUTOMATION_DELIVERY_MODEL || 'deepseek-reasoner' }}
      chatReplyTimeoutMs: ${{ +env.TASK_AUTOMATION_CHAT_REPLY_TIMEOUT_MS || 12000 }}
      chatReplyMaxTokens: ${{ +env.TASK_AUTOMATION_CHAT_REPLY_MAX_TOKENS || 10000 }}
      chatReplySystemPrompt: ${{ env.TASK_AUTOMATION_CHAT_REPLY_SYSTEM_PROMPT || '' }}
    ./dist/plugins/reply:voice:
      enabled: ${{ env.QQ_VOICE_ENABLED !== 'false' }}
      inputEnabled: ${{ env.QQ_VOICE_INPUT_ENABLED !== 'false' }}
      outputEnabled: ${{ env.QQ_VOICE_OUTPUT_ENABLED !== 'false' }}
      asrBaseUrl: ${{ env.QQ_VOICE_ASR_BASE_URL || 'http://127.0.0.1:5161' }}
      asrApiKey: ${{ env.QQ_VOICE_ASR_API_KEY || '' }}
      ttsBaseUrl: ${{ env.QQ_VOICE_TTS_BASE_URL || 'http://127.0.0.1:5162' }}
      ttsApiKey: ${{ env.QQ_VOICE_TTS_API_KEY || '' }}
      inputMaxSeconds: ${{ +env.QQ_VOICE_INPUT_MAX_SECONDS || 60 }}
      outputMaxWords: ${{ +env.QQ_VOICE_OUTPUT_MAX_WORDS || 80 }}
      outputMaxSeconds: ${{ +env.QQ_VOICE_OUTPUT_MAX_SECONDS || 45 }}
      transcribeTimeoutMs: ${{ +env.QQ_VOICE_TRANSCRIBE_TIMEOUT_MS || 45000 }}
      synthTimeoutMs: ${{ +env.QQ_VOICE_SYNTH_TIMEOUT_MS || 300000 }}
    ./dist/plugins/triggers/group-natural:natural-trigger:
      enabled: ${{ env.CHAT_NATURAL_TRIGGER_ENABLED !== 'false' }}
      enabledGroups: ${{ env.CHAT_NATURAL_TRIGGER_GROUPS || '' }}
      aliases: ${{ env.CHAT_NATURAL_TRIGGER_ALIASES || '' }}
      directTriggerProbability: ${{ +env.CHAT_NATURAL_TRIGGER_DIRECT_PROBABILITY || 0.25 }}
      focusWindowMs: ${{ +env.CHAT_NATURAL_TRIGGER_FOCUS_WINDOW_MS || 300000 }}
      replyIntervalMs: ${{ +env.CHAT_NATURAL_TRIGGER_REPLY_INTERVAL_MS || 2000 }}
      spamWindowMs: ${{ +env.CHAT_NATURAL_TRIGGER_SPAM_WINDOW_MS || 10000 }}
      spamThreshold: ${{ +env.CHAT_NATURAL_TRIGGER_SPAM_THRESHOLD || 10 }}
      spamMuteMs: ${{ +env.CHAT_NATURAL_TRIGGER_SPAM_MUTE_MS || 180000 }}
      decisionEnabled: ${{ env.CHAT_NATURAL_TRIGGER_DECISION_ENABLED !== 'false' }}
      decisionBaseUrl: >-
        ${{ env.CHAT_NATURAL_TRIGGER_DECISION_BASE_URL || env.OPENAI_BASE_URL ||
        'https://api.deepseek.com/v1' }}
      decisionApiKey: >-
        ${{ env.CHAT_NATURAL_TRIGGER_DECISION_API_KEY || env.OPENAI_API_KEY ||
        '' }}
      decisionModel: ${{ env.CHAT_NATURAL_TRIGGER_DECISION_MODEL || env.OPENAI_MODEL || '' }}
      decisionTimeoutMs: ${{ +env.CHAT_NATURAL_TRIGGER_DECISION_TIMEOUT_MS || 4000 }}
      decisionMinConfidence: ${{ +env.CHAT_NATURAL_TRIGGER_DECISION_MIN_CONFIDENCE || 0.62 }}
    chatluna:0qm1bk:
      botNames:
        - 祥子
        - 祥
        - 丰川
        - 丰川祥子
        - saki
        - saki酱
        - sakiko
        - 小祥
      isNickNameWithContent: true
      sendThinkingMessage: false
      defaultModel: >-
        ${{ env.CHATLUNA_DEFAULT_MODEL || 'siliconflow/Pro/moonshotai/Kimi-K2.5'
        }}
      defaultPreset: sakiko
      isLog: true
    chatluna-openai-like-adapter:0o3zho:
      platform: siliconflow
      nonStreaming: true
      apiKeys:
        - - ${{ env.CHATLUNA_API_KEY || '' }}
          - ${{ env.CHATLUNA_BASE_URL || 'https://api.siliconflow.cn/v1' }}
          - true
    puppeteer:0vx5c7: {}
    chatluna-search-service:search:
      enabled: ${{ env.CHATLUNA_SEARCH_SERVICE_ENABLED !== 'false' }}
      searchEngine:
        - tavily
      topK: ${{ +env.CHATLUNA_SEARCH_SERVICE_TOPK || 5 }}
      summaryType: ${{ env.CHATLUNA_SEARCH_SERVICE_SUMMARY_TYPE || 'balanced' }}
      summaryModel: ${{ env.CHATLUNA_SEARCH_SERVICE_SUMMARY_MODEL || 'empty' }}
      tavilyApiKey: ${{ env.CHATLUNA_SEARCH_SERVICE_TAVILY_API_KEY || '' }}
    ./dist/plugins/sticker:sticker:
      stickerDir: ${{ env.CHATLUNA_STICKER_DIR || './data/chathub/stickers' }}
    chatluna-plugin-common:qf1a6x:
      think: ${{ env.CHATLUNA_COMMON_THINK === 'true' }}
      send: ${{ env.CHATLUNA_COMMON_SEND !== 'false' }}
      todos: ${{ env.CHATLUNA_COMMON_TODOS !== 'false' }}
      chat: ${{ env.CHATLUNA_COMMON_CHAT !== 'false' }}
      request: ${{ env.CHATLUNA_COMMON_REQUEST !== 'false' }}
      requestMaxOutputLength: ${{ +env.CHATLUNA_COMMON_REQUEST_MAX_OUTPUT_LENGTH || 58600 }}
      fs: ${{ env.CHATLUNA_COMMON_FS === 'true' }}
      fsScopePath: ${{ env.CHATLUNA_COMMON_FS_SCOPE_PATH || '' }}
      command: ${{ env.CHATLUNA_COMMON_COMMAND === 'true' }}
      commandAutoExecute: ${{ env.CHATLUNA_COMMON_COMMAND_AUTO_EXECUTE === 'true' }}
      cron: ${{ env.CHATLUNA_COMMON_CRON === 'true' }}
      group: ${{ env.CHATLUNA_COMMON_GROUP === 'true' }}
      actions: ${{ env.CHATLUNA_COMMON_ACTIONS === 'true' }}
      actionsList:
        - name: weather.geo
          description: 根据城市名称查询经纬度，用于后续天气/未来预报查询。
          headers: {}
          selector:
            - 天气
            - 预报
            - 城市
            - weather
            - forecast
          openAPISpec: |-
            openapi: 3.0.3
            info:
              title: Open-Meteo Geocoding API
              version: 1.0.0
            servers:
              - url: https://geocoding-api.open-meteo.com
            paths:
              /v1/search:
                get:
                  summary: Search city coordinates
                  parameters:
                    - in: query
                      name: name
                      required: true
                      schema:
                        type: string
                    - in: query
                      name: count
                      required: false
                      schema:
                        type: integer
                        default: 1
                    - in: query
                      name: language
                      required: false
                      schema:
                        type: string
                        default: zh
                    - in: query
                      name: format
                      required: false
                      schema:
                        type: string
                        default: json
                  responses:
                    "200":
                      description: OK
        - name: weather.forecast
          description: 根据经纬度查询未来天气预报（按天）。
          headers: {}
          selector:
            - 天气
            - 未来
            - 预报
            - weather
            - forecast
          openAPISpec: |-
            openapi: 3.0.3
            info:
              title: Open-Meteo Forecast API
              version: 1.0.0
            servers:
              - url: https://api.open-meteo.com
            paths:
              /v1/forecast:
                get:
                  summary: Get daily weather forecast
                  parameters:
                    - in: query
                      name: latitude
                      required: true
                      schema:
                        type: number
                    - in: query
                      name: longitude
                      required: true
                      schema:
                        type: number
                    - in: query
                      name: daily
                      required: false
                      schema:
                        type: string
                        default: weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max
                    - in: query
                      name: forecast_days
                      required: false
                      schema:
                        type: integer
                        default: 7
                    - in: query
                      name: timezone
                      required: false
                      schema:
                        type: string
                        default: Asia/Shanghai
                  responses:
                    "200":
                      description: OK
      draw: false
      music: false
    chatluna-mcp-client:aq3m2y:
      servers: '{"mcpServers":{}}'
      tools: {}
    ./dist/plugins/model-guard:mjddgg: {}
    ./dist/plugins/memory:memory-v2:
      enabled: ${{ env.MEMORY_V2_ENABLED !== 'false' }}
      extractBaseUrl: ${{ env.MEMORY_EXTRACT_BASE_URL || 'https://api.siliconflow.cn/v1' }}
      extractApiKey: ${{ env.MEMORY_EXTRACT_API_KEY || '' }}
      extractModel: ${{ env.MEMORY_EXTRACT_MODEL || 'moonshotai/Kimi-K2-Instruct-0905' }}
      extractTimeoutMs: ${{ +env.MEMORY_EXTRACT_TIMEOUT_MS || 15000 }}
      embedBaseUrl: ${{ env.MEMORY_EMBED_BASE_URL || 'https://api.siliconflow.cn/v1' }}
      embedApiKey: ${{ env.MEMORY_EMBED_API_KEY || '' }}
      embedModel: ${{ env.MEMORY_EMBED_MODEL || 'Qwen/Qwen3-Embedding-8B' }}
      embedTimeoutMs: ${{ +env.MEMORY_EMBED_TIMEOUT_MS || 12000 }}
      queryTopK: ${{ +env.MEMORY_QUERY_TOPK || 8 }}
      promptBudgetTokens: ${{ +env.MEMORY_PROMPT_BUDGET_TOKENS || 1200 }}
      embedBatchSize: ${{ +env.MEMORY_EMBED_BATCH_SIZE || 16 }}
      extractIdleMs: ${{ +env.MEMORY_EXTRACT_IDLE_MS || 90000 }}
      extractMessageBatch: ${{ +env.MEMORY_EXTRACT_MESSAGE_BATCH || 12 }}
      archiveDays: ${{ +env.MEMORY_ARCHIVE_DAYS || 90 }}
    commands:qp6oxu:
      chatluna:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.room:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.model:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.preset:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.tool:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.mcp:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.auth:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
      chatluna.balance:
        config:
          authority: ${{ +env.CHATLUNA_COMMAND_AUTHORITY || 3 }}
